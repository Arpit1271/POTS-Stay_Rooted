<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>POTS - Grower Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,200..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/nav.js"></script>
</head>
<body class="bg-background text-on-background font-body min-h-screen antialiased flex flex-col md:flex-row">
    <!-- Mobile Top Bar -->
    <header id="mobile-top-bar" class="md:hidden sticky top-0 z-40 flex justify-between items-center px-6 py-4 w-full mx-auto bg-surface/90 backdrop-blur-md border-b border-surface-container-high shadow-sm"></header>

    <!-- Desktop Sidebar -->
    <nav id="sidebar-nav" class="hidden md:flex h-screen w-64 fixed left-0 top-0 flex-col py-8 px-6 gap-8 bg-surface border-r border-surface-container-low shadow-sm z-30 overflow-y-auto"></nav>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 pb-20 md:pb-0 min-h-screen flex justify-center">
        <div class="w-full max-w-3xl border-r border-l border-surface-container-low bg-surface-bright min-h-screen page-fade-in">
            <!-- Cover image -->
            <div id="cover-container" class="w-full h-48 md:h-56 bg-surface-container-high relative overflow-hidden">
                <img id="profile-cover" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARhXM-FI8OcIiivrg0wuBFqwQnTyPZurXyWxNX42fAcZH_Xs2pp3tXH0qMoOb6rADurYOv3E1UiwHqlx04cvCmw-WOwNzEI7Z-9-bX_6cQn-oskbZ5MfwpmEUwUIKclNBEnlWlqHbXJgQ6NOkrl9HBpMmzEb4SzAHmGmcpVw6w1UEj0yt11rAteI2gs1sz2F7EXbBUXxYf0R6mrTUGy71NVc7TZI0h0uIVbRZlokjP3MjL2Vmk3pf1gGYuE_thDJwFA_fFiG2VV-E" alt="Cover" />
            </div>

            <!-- Profile Details Header -->
            <div class="px-6 pb-4 relative">
                <!-- Avatar and Action Buttons -->
                <div class="flex justify-between items-end -mt-16 mb-4 relative z-10">
                    <img id="profile-avatar" class="w-28 h-28 md:w-32 md:h-32 rounded-full object-cover border-4 border-surface-bright bg-surface shadow-sm" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="Avatar" />
                    <div id="profile-actions" class="flex items-center gap-3">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <!-- Username and Bio Info -->
                <div id="profile-info" class="space-y-3">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 id="profile-display-name" class="font-headline text-2xl md:text-3xl font-bold text-on-surface">Elena Roots</h2>
                            <span id="profile-verified-badge" class="material-symbols-outlined text-tertiary text-xl hidden" style="font-variation-settings: 'FILL' 1;">verified</span>
                        </div>
                        <p id="profile-username" class="text-on-surface-variant text-sm font-medium">@elena_grows</p>
                    </div>

                    <p id="profile-bio" class="text-on-surface leading-relaxed text-[15px] max-w-xl whitespace-pre-line"></p>

                    <!-- Location & Date Info -->
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1.5 text-on-surface-variant text-sm font-medium">
                        <div id="profile-location-wrap" class="flex items-center gap-1.5 hidden">
                            <span class="material-symbols-outlined text-[18px]">location_on</span>
                            <span id="profile-location">Portland, OR</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-[18px]">calendar_month</span>
                            <span>Planted <span id="profile-joined-date">April 2023</span></span>
                        </div>
                    </div>

                    <!-- Follower/Following Stats -->
                    <div class="flex items-center gap-6 text-sm mt-4">
                        <a href="#" class="hover:underline text-on-surface">
                            <span id="profile-growers-count" class="font-bold text-on-surface">0</span>
                            <span class="text-on-surface-variant">Growers</span>
                        </a>
                        <a href="#" class="hover:underline text-on-surface">
                            <span id="profile-following-count" class="font-bold text-on-surface">0</span>
                            <span class="text-on-surface-variant">Following</span>
                        </a>
                        <div>
                            <span id="profile-pots-count" class="font-bold text-on-surface">0</span>
                            <span class="text-on-surface-variant">Pots</span>
                        </div>
                    </div>
                </div>

                <!-- Profile Tabs -->
                <div class="flex border-b border-surface-container-low mt-8 text-sm font-bold">
                    <button id="tab-pots" class="flex-1 py-3 border-b-2 border-primary text-primary text-center">Pots</button>
                    <button id="tab-replies" class="flex-1 py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface text-center">Replies</button>
                    <button id="tab-media" class="flex-1 py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface text-center">Media</button>
                </div>
            </div>

            <!-- Feed Content -->
            <div id="profile-posts" class="divide-y divide-surface-container-low"></div>

            <!-- Loading Spinner -->
            <div id="profile-loading" class="flex justify-center py-12">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav id="bottom-nav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container shadow-[0_-4px_20px_rgba(46,50,48,0.06)] rounded-t-xl border-t border-surface-container-low pb-safe"></nav>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal-overlay flex items-center justify-center p-4">
        <div class="modal-content max-w-lg w-full bg-surface-bright rounded-xl p-6 border border-surface-container-low shadow-xl">
            <div class="flex items-center justify-between pb-4 border-b border-surface-container-low mb-6">
                <h3 class="font-headline font-bold text-xl text-on-surface">Edit Profile</h3>
                <button id="edit-profile-close" class="text-on-surface-variant hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="edit-profile-form" class="space-y-4">
                <!-- Cover Image Edit -->
                <div>
                    <label class="block text-sm font-semibold text-on-surface mb-2">Cover Photo</label>
                    <div class="relative w-full h-32 rounded-xl overflow-hidden bg-surface-container-high border border-surface-container">
                        <img id="edit-profile-cover-preview" class="w-full h-full object-cover" src="" />
                        <button type="button" id="edit-profile-cover-btn" class="absolute inset-0 bg-black/45 hover:bg-black/55 transition-colors flex items-center justify-center text-white gap-2 font-bold text-sm">
                            <span class="material-symbols-outlined">camera_enhance</span>
                            Change Cover
                        </button>
                        <input id="edit-profile-cover-input" type="file" accept="image/*" class="hidden" />
                    </div>
                </div>

                <!-- Avatar Edit -->
                <div class="flex items-center gap-4 py-2">
                    <div class="relative w-20 h-20 rounded-full overflow-hidden border border-surface-container bg-surface shrink-0">
                        <img id="edit-profile-avatar-preview" class="w-full h-full object-cover" src="" />
                        <button type="button" id="edit-profile-avatar-btn" class="absolute inset-0 bg-black/45 hover:bg-black/55 transition-colors flex items-center justify-center text-white">
                            <span class="material-symbols-outlined text-[20px]">camera_enhance</span>
                        </button>
                        <input id="edit-profile-avatar-input" type="file" accept="image/*" class="hidden" />
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-on-surface">Grower Icon</h4>
                        <p class="text-xs text-on-surface-variant">Click the icon to upload a plant or portrait image.</p>
                    </div>
                </div>

                <!-- Display Name -->
                <div>
                    <label for="edit-display-name" class="block text-sm font-semibold text-on-surface mb-2">Display Name</label>
                    <input type="text" id="edit-display-name" class="w-full bg-surface-container-low border border-surface-container rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all font-body text-sm text-on-surface placeholder:text-on-surface-variant" required />
                </div>

                <!-- Bio -->
                <div>
                    <label for="edit-bio" class="block text-sm font-semibold text-on-surface mb-2">Bio</label>
                    <textarea id="edit-bio" rows="3" class="w-full bg-surface-container-low border border-surface-container rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all font-body text-sm text-on-surface placeholder:text-on-surface-variant resize-none" placeholder="Share your plant journey..."></textarea>
                </div>

                <!-- Location -->
                <div>
                    <label for="edit-location" class="block text-sm font-semibold text-on-surface mb-2">Location</label>
                    <input type="text" id="edit-location" class="w-full bg-surface-container-low border border-surface-container rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all font-body text-sm text-on-surface placeholder:text-on-surface-variant" placeholder="e.g. Portland, OR" />
                </div>

                <!-- Action buttons -->
                <div class="flex gap-3 pt-4 border-t border-surface-container-low justify-end">
                    <button type="button" id="edit-profile-cancel" class="px-5 py-2.5 rounded-xl border border-surface-container text-on-surface-variant hover:bg-surface-container transition-colors font-bold text-sm">Cancel</button>
                    <button type="submit" id="edit-profile-save" class="px-5 py-2.5 rounded-xl bg-primary text-on-primary hover:opacity-90 transition-opacity font-bold text-sm">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Pot Modal -->
    <div id="new-pot-modal" class="modal-overlay flex items-center justify-center p-4">
        <div class="modal-content max-w-lg w-full bg-surface-bright rounded-xl p-6 border border-surface-container-low shadow-xl">
            <div class="flex items-center justify-between pb-4 border-b border-surface-container-low mb-4">
                <h3 class="font-headline text-xl font-bold text-on-surface">New Pot</h3>
                <button onclick="document.getElementById('new-pot-modal').classList.remove('active')" class="text-on-surface-variant hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="flex gap-4">
                <img id="modal-avatar" class="w-10 h-10 rounded-full object-cover shrink-0" src="https://api.dicebear.com/7.x/initials/svg?seed=User" />
                <div class="flex-1">
                    <textarea id="modal-textarea" class="w-full bg-transparent border-none focus:ring-0 resize-none text-base placeholder-on-surface-variant/70 font-body p-0 min-h-[120px]" placeholder="Plant a thought..."></textarea>
                    
                    <div id="modal-image-preview-container" class="hidden relative rounded-xl overflow-hidden mb-3 border border-surface-container">
                        <img id="modal-image-preview" class="w-full h-auto object-cover max-h-[200px]" />
                        <button id="modal-image-remove" class="absolute top-2 right-2 bg-black/60 text-white rounded-full p-1 hover:bg-black/80 transition-colors">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>

                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-surface-container-low">
                        <div class="flex gap-2 text-primary">
                            <button id="modal-image-btn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors">
                                <span class="material-symbols-outlined">image</span>
                            </button>
                            <input id="modal-image-input" type="file" accept="image/*" class="hidden" />
                        </div>
                        <button id="modal-plant-btn" class="px-6 py-2 bg-primary text-on-primary font-bold rounded-xl hover:opacity-90 transition-opacity">
                            Plant
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
