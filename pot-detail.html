<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>POTS - Pot Detail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,200..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/nav.js"></script>
</head>
<body class="bg-background text-on-background font-body min-h-screen antialiased flex flex-col md:flex-row">
    <!-- Mobile Top Bar -->
    <header id="mobile-top-bar" class="md:hidden sticky top-0 z-40 flex justify-between items-center px-6 py-4 w-full mx-auto bg-surface/90 backdrop-blur-md border-b border-surface-container-high shadow-sm"></header>

    <!-- Desktop Sidebar -->
    <nav id="sidebar-nav" class="hidden md:flex h-screen w-64 fixed left-0 top-0 flex-col py-8 px-6 gap-8 bg-surface border-r border-surface-container-low shadow-sm z-30 overflow-y-auto"></nav>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 pb-20 md:pb-0 min-h-screen flex justify-center">
        <!-- Center Column -->
        <div class="w-full max-w-2xl pt-4 pb-24 md:py-8 px-4 sm:px-6 page-fade-in">
            
            <!-- Back Button -->
            <div class="mb-4">
                <button onclick="window.history.back()" class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors font-bold">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Back
                </button>
            </div>

            <!-- Pot Detail Container -->
            <div id="pot-detail-container" class="mb-6"></div>

            <!-- Reply Area -->
            <section class="bg-surface-bright rounded-xl p-6 soft-shadow mb-8 border border-surface-container-low">
                <div class="flex gap-4">
                    <img id="reply-avatar" alt="Current User" class="w-10 h-10 rounded-full object-cover shrink-0 cursor-pointer" src="https://api.dicebear.com/7.x/initials/svg?seed=User" />
                    <div class="flex-1">
                        <textarea id="reply-textarea" class="w-full bg-transparent border-none focus:ring-0 resize-none text-base placeholder-on-surface-variant/70 font-body p-0 min-h-[60px]" placeholder="Plant a reply..."></textarea>
                        <div class="flex items-center justify-end mt-2 pt-2 border-t border-surface-container-low">
                            <button id="reply-submit-btn" class="px-5 py-1.5 bg-primary text-on-primary font-bold rounded-xl hover:opacity-90 transition-opacity text-sm">
                                Reply
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Comments Container -->
            <div id="comments-container" class="flex flex-col gap-4"></div>

            <!-- Loading Spinner -->
            <div id="detail-loading" class="flex justify-center py-12">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Right Sidebar (Desktop only) -->
        <aside class="hidden lg:block w-80 sticky top-0 h-screen py-8 px-6 overflow-y-auto border-l border-surface-container-low bg-surface">
            <!-- Search bar -->
            <div class="relative mb-8">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                <input id="sidebar-search" class="w-full bg-surface-container-high border-none rounded-full py-3 pl-12 pr-4 text-on-surface placeholder-on-surface-variant focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all font-body" placeholder="Search roots..." type="text">
            </div>

            <!-- Trending Roots -->
            <div class="bg-surface-container rounded-xl p-5 mb-8 soft-shadow">
                <h3 class="font-headline font-bold text-xl text-on-surface mb-4">Trending Roots</h3>
                <div id="trending-roots-list" class="flex flex-col gap-4">
                    <!-- Loaded dynamically -->
                </div>
                <button onclick="window.location.href='explore.html'" class="text-primary font-bold text-sm mt-4 hover:underline">Show more</button>
            </div>

            <!-- Grow Your Network -->
            <div class="bg-surface-container rounded-xl p-5 soft-shadow">
                <h3 class="font-headline font-bold text-xl text-on-surface mb-4">Grow Your Network</h3>
                <div id="grow-network-list" class="flex flex-col gap-5">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <div class="mt-6 flex flex-col gap-2 px-2">
                <button class="w-full py-2 px-4 rounded-xl border border-tertiary text-tertiary font-bold text-sm hover:bg-tertiary-container/20 transition-colors">
                    Terms and Conditions
                </button>
                <button class="w-full py-2 px-4 rounded-xl border border-tertiary text-tertiary font-bold text-sm hover:bg-tertiary-container/20 transition-colors">
                    How we use your Data
                </button>
            </div>
        </aside>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav id="bottom-nav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container shadow-[0_-4px_20px_rgba(46,50,48,0.06)] rounded-t-xl border-t border-surface-container-low pb-safe"></nav>

    <!-- New Pot Modal -->
    <div id="new-pot-modal" class="modal-overlay flex items-center justify-center p-4">
        <div class="modal-content max-w-lg w-full bg-surface-bright rounded-xl p-6 border border-surface-container-low shadow-xl">
            <div class="flex items-center justify-between pb-4 border-b border-surface-container-low mb-4">
                <h3 class="font-headline font-bold text-xl text-on-surface">New Pot</h3>
                <button onclick="document.getElementById('new-pot-modal').classList.remove('active')" class="text-on-surface-variant hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="flex gap-4">
                <img id="modal-avatar" class="w-10 h-10 rounded-full object-cover shrink-0" src="https://api.dicebear.com/7.x/initials/svg?seed=User" />
                <div class="flex-1">
                    <textarea id="modal-textarea" class="w-full bg-transparent border-none focus:ring-0 resize-none text-base placeholder-on-surface-variant/70 font-body p-0 min-h-[120px]" placeholder="Plant a thought..."></textarea>
                    
                    <div id="modal-image-preview-container" class="hidden relative rounded-xl overflow-hidden mb-3 border border-surface-container">
                        <img id="modal-image-preview" class="w-full h-auto object-cover max-h-[200px]" />
                        <button id="modal-image-remove" class="absolute top-2 right-2 bg-black/60 text-white rounded-full p-1 hover:bg-black/80 transition-colors">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>

                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-surface-container-low">
                        <div class="flex gap-2 text-primary">
                            <button id="modal-image-btn" class="p-2 rounded-full hover:bg-surface-container-high transition-colors">
                                <span class="material-symbols-outlined">image</span>
                            </button>
                            <input id="modal-image-input" type="file" accept="image/*" class="hidden" />
                        </div>
                        <button id="modal-plant-btn" class="px-6 py-2 bg-primary text-on-primary font-bold rounded-xl hover:opacity-90 transition-opacity">
                            Plant
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/pot-detail.js"></script>
</body>
</html>
